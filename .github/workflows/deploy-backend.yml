name: Deploy Backend to EC2

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "web/**"
      - "**/*.md"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.EC2_HOST != '' && vars.EC2_HOST || secrets.EC2_HOST }}
      DEPLOY_USER: ${{ vars.EC2_USER != '' && vars.EC2_USER || secrets.EC2_USER }}
      DEPLOY_PORT: ${{ vars.EC2_PORT != '' && vars.EC2_PORT || secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        env:
          EC2_HOST: ${{ env.DEPLOY_HOST }}
          EC2_USER: ${{ env.DEPLOY_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=()

          [[ -z "${EC2_HOST}" ]] && missing+=("EC2_HOST")
          [[ -z "${EC2_USER}" ]] && missing+=("EC2_USER")
          [[ -z "${EC2_SSH_KEY}" ]] && missing+=("EC2_SSH_KEY")
          [[ -z "${PROD_ENV_FILE}" ]] && missing+=("PROD_ENV_FILE")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required deploy configuration. Expected EC2_HOST/EC2_USER (vars or secrets), plus EC2_SSH_KEY and PROD_ENV_FILE as secrets. Missing: ${missing[*]}"
            exit 1
          fi

          if ! grep -q "BEGIN .* PRIVATE KEY" <<< "${EC2_SSH_KEY}"; then
            echo "::error::EC2_SSH_KEY does not look like a private key. Paste full PEM content including BEGIN/END lines."
            exit 1
          fi

      - name: Upload backend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          port: ${{ env.DEPLOY_PORT }}
          source: "docker-compose.yml,docker-compose.prod.yml,Dockerfile.grader,go.mod,go.sum,cmd,internal,migrations,Makefile,skills.md,Readme.md"
          target: "/opt/ai-grader/app"
          rm: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          port: ${{ env.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/ai-grader/app

            mkdir -p "$HOME/.docker/cli-plugins"
            curl -fsSL https://github.com/docker/buildx/releases/download/v0.21.1/buildx-v0.21.1.linux-amd64 -o "$HOME/.docker/cli-plugins/docker-buildx"
            chmod +x "$HOME/.docker/cli-plugins/docker-buildx"
            docker buildx version

            cat > .env <<'EOF'
            ${{ secrets.PROD_ENV_FILE }}
            EOF

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans

            if ! docker exec ai-grader-db psql -U ai-grader -d ai_grader -tAc "select 1 from pg_tables where schemaname='public' and tablename='users'" | grep -q 1; then
              docker exec -i ai-grader-db psql -U ai-grader -d ai_grader < migrations/001_schema.sql
            fi

            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
